  # add_extra_candles is incompatible with progressive_items
  - id: add_extra_candles_incompatible_with_progressive_items
    description: >
      Add Extra Candles is incompatible with Progressive Items. When progressive
      items is on, candles are handled as upgrades and the extra candle slots
      would conflict with the progressive chain logic.
    when:
      - flag: add_extra_candles
        not_equals: "off"
    then:
      - flag: progressive_items
        must_not_be: "on"
        error: >
          Add Extra Candles is incompatible with Progressive Items.

