# =============================================================================
# NES COLOR PALETTE
# Standard 2C02 palette RGB hex values for the color picker UI.
# 64 entries (0x00-0x3F) arranged in a 4x16 grid.
# Excluded entries are not selectable but shown as disabled cells.
#
# Color type flag encoding (6 bits, 0-63):
#   Value 0 = vanilla (default)
#   Values 1-13  = NES palette 0x00-0x0C
#   Value 14     = random
#   Values 15-63 = NES palette 0x0F-0x3F
# NES 0x0D (causes TV problems) and 0x0E (redundant black) are excluded.
# =============================================================================

nes_color_palette:
