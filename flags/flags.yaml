  # extra_power_bracelet_blocks is incompatible with include_any_road_caves
  - id: extra_pb_blocks_incompatible_with_any_road
    description: >
      Extra Power Bracelet Blocks and Include Any Road Caves are mutually
      incompatible. Extra PB Blocks adds bracelet gates to the any-road
      screens, making them unreachable if those caves are shuffled into
      the bracelet-gated pool.
    when:
      - flag: extra_power_bracelet_blocks
        not_equals: "off"
    then:
      - flag: include_any_road_caves
        must_be: "off"
        error: >
          Extra Power Bracelet Blocks is incompatible with Include Any Road
          Caves. The any-road screens would become bracelet-gated, making
          the cave shuffle logic inconsistent.

  # randomize_lost_hills requires hint_mode in {community, helpful}
  - id: randomize_lost_hills_requires_hint_mode
    description: >
      Randomize Lost Hills requires Hint Mode to be Community or Helpful, because
      the direction sequence is communicated to the player via a hint NPC and
      requires the extended hint bank.
    when:
      - flag: randomize_lost_hills
        not_equals: "off"
    then:
      - flag: hint_mode
        must_be_one_of: ["community", "helpful"]
        error: >
