# =============================================================================
# CONSTRAINTS
# =============================================================================

constraints:

  # shuffle_dungeon_hearts requires shuffle_dungeon_items != off
  - id: dungeon_hearts_requires_dungeon_items
    description: >
      Shuffle Dungeon Hearts requires Shuffle Dungeon Items to be enabled.
    when:
      - flag: shuffle_dungeon_hearts
        not_equals: "off"
    then:
      - flag: shuffle_dungeon_items
        must_not_be: "off"
        error: "Shuffle Dungeon Hearts requires Shuffle Dungeon Items to be enabled."

  # allow_triforces_in_stairways requires shuffle_within_dungeons != off
  - id: triforces_in_stairways_requires_shuffle_within
    description: >
      Allow Triforces in Stairways requires Shuffle Within Dungeons to be enabled.
    when:
      - flag: allow_triforces_in_stairways
        not_equals: "off"
    then:
      - flag: shuffle_within_dungeons
        must_not_be: "off"
        error: "Allow Triforces in Stairways requires Shuffle Within Dungeons to be enabled."

  # force_rr_to_l9 requires shuffle_dungeon_items == on
  - id: force_rr_requires_dungeon_items_on
    description: >
      Force Red Ring to Level 9 requires Shuffle Dungeon Items to be explicitly
      on (not random), because random might resolve to off at generation time.
    when:
      - flag: force_rr_to_l9
        not_equals: "off"
    then:
      - flag: shuffle_dungeon_items
        must_be: "on"
        error: >
          Force Red Ring to Level 9 requires Shuffle Dungeon Items to be set
          to on (not random), to guarantee red ring is in the item pool.

  # force_sa_to_l9 requires shuffle_dungeon_items == on
  - id: force_sa_requires_dungeon_items_on
    description: >
      Force Silver Arrows to Level 9 requires Shuffle Dungeon Items to be
      explicitly on (not random).
    when:
      - flag: force_sa_to_l9
        not_equals: "off"
    then:
      - flag: shuffle_dungeon_items
        must_be: "on"
        error: >
          Force Silver Arrows to Level 9 requires Shuffle Dungeon Items to be
          set to on (not random), to guarantee silver arrows are in the item pool.

  # coast_item cannot be ladder
  - id: coast_item_not_ladder
    description: >
      Ladder cannot be placed at the coast location — the ladder is logically
      required to reach this location and would make the seed unbeatable.
    when:
      - flag: coast_item
        equals: "ladder"
    then:
      - error: >
          Ladder cannot be placed at the coast location — it is logically
          required to reach this location.

  # item fields: selected item must be in the active pool
  - id: white_sword_item_in_pool
    description: The white sword cave forced item must be in the active item pool.
    when:
      - flag: white_sword_item
        not_equals: "not_shuffled"
    then:
      - flag: white_sword_item
        rule: item_in_pool
        error: >
          The selected white sword cave item is not in the active item pool.
          Enable the appropriate shuffle flag or choose a different item.

  - id: armos_item_in_pool
    description: The armos cave forced item must be in the active item pool.
    when:
      - flag: armos_item
        not_equals: "not_shuffled"
    then:
      - flag: armos_item
        rule: item_in_pool
        error: >
          The selected armos cave item is not in the active item pool.
          Enable the appropriate shuffle flag or choose a different item.

  - id: coast_item_in_pool
    description: The coast forced item must be in the active item pool.
    when:
      - flag: coast_item
        not_equals: "not_shuffled"
    then:
      - flag: coast_item
        rule: item_in_pool
        error: >
          The selected coast item is not in the active item pool.
          Enable the appropriate shuffle flag or choose a different item.

  # No duplicate forced placements across the three item fields
  - id: no_duplicate_forced_items
    description: >
      The same item cannot be forced to multiple locations simultaneously.
    when:
      - flag: white_sword_item
        not_equals: "not_shuffled"
    then:
      - flag: white_sword_item
        rule: no_duplicate
        among: [armos_item, coast_item]
        error: >
          The same item cannot be forced to multiple locations simultaneously.

  # Heart container pool availability
  - id: heart_container_pool_check_white_sword
    description: >
      Heart container can only be forced to the white sword cave if there is
      at least one heart container in the active item pool.
    when:
      - flag: white_sword_item
        equals: "heart_container"
    then:
      - rule: heart_container_pool_check
        error: >
          Heart container is not available in the pool. Enable Shuffle Dungeon
          Hearts, or ensure exactly one forced location uses heart container
          while another shuffled location provides it.

  - id: heart_container_pool_check_armos
    description: Heart container pool check for armos item field.
    when:
      - flag: armos_item
        equals: "heart_container"
    then:
      - rule: heart_container_pool_check
        error: >
          Heart container is not available in the pool. Enable Shuffle Dungeon
          Hearts, or ensure exactly one forced location uses heart container
          while another shuffled location provides it.

  - id: heart_container_pool_check_coast
    description: Heart container pool check for coast item field.
    when:
      - flag: coast_item
        equals: "heart_container"
    then:
      - rule: heart_container_pool_check
        error: >
          Heart container is not available in the pool. Enable Shuffle Dungeon
          Hearts, or ensure exactly one forced location uses heart container
          while another shuffled location provides it.

  # include_wood_sword_cave requires non-dungeon cave shuffling active
  - id: wood_sword_cave_requires_non_dungeon_shuffle
    description: >
      Include Wood Sword Cave requires Cave Shuffle to include non-dungeon caves
      (Non-Dungeons Only or All Caves).
    when:
      - flag: include_wood_sword_cave
        not_equals: "off"
    then:
      - flag: cave_shuffle_mode
        must_be_one_of: ["non_dungeons_only", "all_caves"]
        error: >
          Include Wood Sword Cave requires Cave Shuffle to be set to
          Non-Dungeons Only or All Caves.

