# =============================================================================
# FLAGS
#
# Required fields for every flag:
#   id             — stable Python identifier; never rename
#   type           — bool | tristate | item
#   bits           — bit width (1=bool, 2=tristate, 5=item)
#   bit_offset     — PERMANENT position in the bitfield; never change
#   label          — display name in UI
#   description    — tooltip / help text
#   group          — UI section grouping
#   display_order  — sort order within group (unique per group; hidden flags exempt)
#   default        — default value
#   enabled        — false = defined but inactive (not shown in UI, not used by backend)
#
# Optional fields:
#   depends_on     — id of prerequisite flag (informational; enforcement via constraints)
#   phase          — roadmap phase that implements this flag (informational)
# =============================================================================

flags:

  # ---------------------------------------------------------------------------
  # GROUP: Item Shuffle
  # Controls what enters the item pool and which locations are valid destinations
  # ---------------------------------------------------------------------------

  - id: shuffle_dungeon_items
    type: tristate
    bits: 2
    bit_offset: 0
    label: "Shuffle Dungeon Items"
    description: >
      Adds the 12 major dungeon items to the item pool and makes their vanilla
      locations valid placement destinations. The 12 items are: bow, boomerang,
      magical boomerang, raft, ladder, recorder, wand, red candle, book of magic,
      magical key, silver arrows, and red ring.
      When off, dungeon item locations retain their vanilla contents.
    group: "Item Shuffle"
    display_order: 10
    default: "off"
    enabled: true
    phase: 1

  - id: shuffle_dungeon_hearts
    type: tristate
    bits: 2
    bit_offset: 2
    label: "Shuffle Dungeon Hearts"
    description: >
      Adds the 8 boss heart containers (levels 1-8) to the item pool.
      Requires Shuffle Dungeon Items to be enabled.
    group: "Item Shuffle"
    display_order: 20
    default: "off"
    depends_on: shuffle_dungeon_items
    enabled: true
    phase: 1


  - id: shuffle_within_dungeons
    type: tristate
    bits: 2
    bit_offset: 8
    label: "Shuffle Within Dungeons"
    description: >
      Shuffles major and minor items within each dungeon
      in addition to the normal dungeon item shuffle.
    group: "Item Shuffle"
    display_order: 50
    default: "off"
    enabled: true
    phase: 1

  - id: allow_triforces_in_stairways
    type: tristate
    bits: 2
    bit_offset: 12
    label: "Allow Triforces in Stairways"
    description: >
      Extends Shuffle Within Dungeons to also allow triforce pieces to be
      placed in item stairway locations within dungeons.
      Requires Shuffle Within Dungeons to be enabled.
    group: "Item Shuffle"
    display_order: 60
    default: "off"
    depends_on: shuffle_within_dungeons
    enabled: true
    phase: 1

  - id: shuffle_wood_sword
    type: tristate
    bits: 2
    bit_offset: 20
    label: "Shuffle Wood Sword"
    description: >
      Adds the wood sword to the item pool and makes the wood sword cave
      a valid item placement destination.
    group: "Item Shuffle"
    display_order: 110
    default: "off"
    enabled: true
    phase: 1

  - id: shuffle_magical_sword
    type: tristate
    bits: 2
    bit_offset: 22
    label: "Shuffle Magical Sword"
    description: >
      Adds the magical sword to the item pool and makes the magical sword
      cave a valid item placement destination.
    group: "Item Shuffle"
    display_order: 120
    default: "off"
    enabled: true
    phase: 1

  - id: shuffle_letter
    type: tristate
    bits: 2
    bit_offset: 18
    label: "Shuffle Letter"
    description: >
      Adds the letter to the item pool and makes the letter cave a valid
      item placement destination.
    group: "Item Shuffle"
    display_order: 130
    default: "off"
    enabled: true
    phase: 1

  - id: shuffle_major_shop_items
    type: tristate
    bits: 2
    bit_offset: 24
    label: "Shuffle Major Shop Items"
    description: >
      Adds the wood arrows, blue candle, blue ring, and bait from shops A-D
      to the item pool. The second bait slot is replaced with a fairy for
      purchase and is not shuffled.
    group: "Item Shuffle"
    display_order: 140
    default: "off"
    enabled: true
    phase: 1

  - id: shuffle_blue_potion
    type: tristate
    bits: 2
    bit_offset: 26
    label: "Shuffle Blue Potion"
    description: >
      Adds the blue potion from the potion shop to the item pool and makes
      the potion shop a valid item placement destination.
    group: "Item Shuffle"
    display_order: 150
    default: "off"
    enabled: true
    phase: 1

  - id: progressive_items
    type: tristate
    bits: 2
    bit_offset: 28
    label: "Progressive Items"
    description: >
      Makes swords, candles, arrows, and rings progressive. All items of each
      class become level-1 upgrades regardless of which shuffle flags are active.
      Picking up a level-1 item when you already own one increments your level
      in that class. If this flag is on but Shuffle Magical Sword is off, the
      magical sword cave still contains a sword upgrade.
      Random means the choice is made randomly at generation time.
    group: "Item Shuffle"
    display_order: 160
    default: "off"
    enabled: true
    phase: 1

  - id: allow_important_in_l9
    type: tristate
    bits: 2
    bit_offset: 10
    label: "Allow Important Items in Level 9"
    description: >
      By default the five logically critical items (ladder, raft, power bracelet,
      recorder, and bow) may not be placed in level 9. Enabling this removes
      that restriction.
    group: "Item Shuffle"
    display_order: 210
    default: "off"
    enabled: true
    phase: 1

  - id: force_rr_to_l9
    type: tristate
    bits: 2
    bit_offset: 14
    label: "Force Red Ring to Level 9"
    description: >
      Guarantees the red ring will only be found in level 9.
      Requires Shuffle Dungeon Items to be explicitly on (not random).
    group: "Item Shuffle"
    display_order: 220
    default: "off"
    depends_on: shuffle_dungeon_items
    enabled: true
    phase: 1

  - id: force_sa_to_l9
    type: tristate
    bits: 2
    bit_offset: 16
    label: "Force Silver Arrows to Level 9"
    description: >
      Guarantees silver arrows will only be found in level 9.
      Requires Shuffle Dungeon Items to be explicitly on (not random).
    group: "Item Shuffle"
    display_order: 230
    default: "off"
    depends_on: shuffle_dungeon_items
    enabled: true
    phase: 1

  - id: white_sword_item
    type: item
    bits: 5
    bit_offset: 30
    label: "White Sword Cave Item"
    description: >
      Controls the white sword cave location. Not Shuffled leaves it vanilla.
      Random adds it to the shuffle pool with no placement constraint.
      Selecting a specific item adds it to the pool and forces that item here.
      The selected item must be present in the active item pool.
    group: "Item Shuffle"
    display_order: 240
    default: "not_shuffled"
    enabled: true
    phase: 1

  - id: armos_item
    type: item
    bits: 5
    bit_offset: 35
    label: "Armos Item"
    description: >
      Controls the armos knights secret location (vanilla: power bracelet).
      Not Shuffled leaves it vanilla. Random adds it to the shuffle pool
      with no placement constraint. Selecting a specific item adds it to
      the pool and forces that item here. The selected item must be present
      in the active item pool.
    group: "Item Shuffle"
    display_order: 250
    default: "not_shuffled"
    enabled: true
    phase: 1

  - id: coast_item
    type: item
    bits: 5
    bit_offset: 40
    label: "Coast Item"
    description: >
      Controls the coast location (vanilla: heart container). Not Shuffled
      leaves it vanilla. Random adds it to the shuffle pool with no placement
      constraint. Selecting a specific item adds it to the pool and forces
      that item here. Ladder cannot be selected — it is logically required
      to reach this location.
    group: "Item Shuffle"
    display_order: 260
    default: "not_shuffled"
    enabled: true
    phase: 1

  # ---------------------------------------------------------------------------
  # GROUP: Misc
  # Difficulty, cosmetic, and gameplay settings
  # ---------------------------------------------------------------------------

  - id: avoid_required_hard_combat
    type: tristate
    bits: 2
    bit_offset: 47
    label: "Avoid Required Hard Combat"
    description: >
      When enabled, the logic engine requires the player to have at least one
      sword upgrade (white sword or better) AND one defense upgrade (blue or
      red ring) before considering hard enemies (blue wizzrobes, blue darknuts,
      gleeoks, patras) as defeatable. This makes seeds more accessible to
      casual players by ensuring difficult combat encounters are never logically
      required without adequate equipment.
    group: "Misc"
    display_order: 210
    default: "off"
    enabled: true
    phase: 1

  - id: randomize_dungeon_palettes
    type: tristate
    bits: 2
    bit_offset: 49
    label: "Randomize Dungeon Palettes"
    description: >
      Randomly assigns color palettes across all 9 dungeons. Each dungeon gets
      a randomized color theme drawn from 14 curated accent color schemes,
      while preserving structural fade and stairway palette sequences.
    group: "Misc"
    display_order: 20
    default: "off"
    enabled: true
    phase: 1

  - id: hint_mode
    type: enum
    bits: 3
    bit_offset: 51
    label: "Hint Mode"
    description: >
      Controls the style of hint text shown in caves and hint shops.
      Vanilla: no changes to hint text.
      Blank: all hint slots are set to blank.
      Community: random community quotes per slot.
      Helpful: gameplay-aware item location hints with community filler.
      Random: resolves to one of the above at generation time.
    group: "Misc"
    display_order: 10
    default: "vanilla"
    enabled: true
    phase: 1
    values:
      - id: vanilla
        label: "Vanilla"
      - id: blank
        label: "Blank"
      - id: community
        label: "Community"
      - id: helpful
        label: "Helpful"
      - id: random
        label: "Random"

  - id: randomize_bomb_upgrade
    type: tristate
    bits: 2
    bit_offset: 55
    label: "Randomize Bomb Upgrades"
    description: >
      Randomizes the bomb upgrade's cost (75-125 rupees) and the number of
      bombs added to your maximum (2-6). The on-screen price display is updated
      to match the randomized cost.
    group: "Caves and Shops"
    display_order: 50
    default: "off"
    enabled: true
    phase: 1

  - id: speed_up_dungeon_transitions
    type: tristate
    bits: 2
    bit_offset: 71
    label: "Speed Up Dungeon Transitions"
    description: >
      Removes the scroll-delay loops during dungeon screen transitions,
      making room-to-room movement noticeably faster.
    group: "Quality of Life"
    display_order: 30
    default: "off"
    enabled: true
    phase: 1

  - id: speed_up_text
    type: tristate
    bits: 2
    bit_offset: 73
    label: "Speed Up Text"
    description: >
      Reduces the text rendering delay so hint and shop text draws faster.
    group: "Quality of Life"
    display_order: 20
    default: "off"
    enabled: true
    phase: 1

  - id: extra_raft_blocks
    type: tristate
    bits: 2
    bit_offset: 75
    label: "Extra Raft Blocks"
    description: >
      Converts the Westlake Mall and Casino Corner regions into raft-blocked
      areas, requiring the raft to access additional overworld screens.
    group: "Overworld"
    display_order: 310
    default: "off"
    enabled: true
    phase: 1

  - id: extra_power_bracelet_blocks
    type: tristate
    bits: 2
    bit_offset: 77
    label: "Extra Power Bracelet Blocks"
    description: >
      Adds new power bracelet blocks in West Death Mountain. Intended for use
      with vanilla any road locations.
    group: "Overworld"
    display_order: 320
    default: "off"
    enabled: true
    phase: 1

  - id: randomize_lost_hills
    type: tristate
    bits: 2
    bit_offset: 79
    label: "Randomize Lost Hills"
    description: >
      Randomizes the Lost Hills direction sequence and adds a hint NPC in the
      game. Requires Randomize Hints and Extended Hint Bank to be enabled.
    group: "Overworld"
    display_order: 330
    default: "off"
    enabled: true
    phase: 1

  - id: randomize_dead_woods
    type: tristate
    bits: 2
    bit_offset: 81
    label: "Randomize Dead Woods"
    description: >
      Randomizes the Dead Woods direction sequence and adds a hint NPC in the
      game. Requires Randomize Hints and Extended Hint Bank to be enabled.
    group: "Overworld"
    display_order: 340
    default: "off"
    enabled: true
    phase: 1

  - id: update_recorder_warp_screens
    type: tristate
    bits: 2
    bit_offset: 120
    label: "Update Recorder Warp Screens"
    description: >
      When enabled, recalculates the recorder warp destinations for levels 1-8
      based on their shuffled overworld screen positions. The recorder warps Link
      to the screen one to the left of each dungeon entrance (the whirlwind
      scrolls him right automatically). Without this flag, the recorder always
      warps to vanilla screens regardless of entrance shuffle.
    group: "Overworld"
    display_order: 110
    default: "off"
    enabled: true
    phase: 2

  - id: add_extra_candles
    type: tristate
    bits: 2
    bit_offset: 83
    label: "Add Extra Candles"
    description: >
      Adds a blue candle to the wood sword cave and a candle to the middle slot
      of the take-any cave. Incompatible with Progressive Items.
    group: "Item Shuffle"
    display_order: 155
    default: "off"
    enabled: true
    phase: 1

  - id: fast_fill
    type: tristate
    bits: 2
    bit_offset: 85
    label: "Speed Up Heart Fill"
    description: >
      Fill hearts faster from fairies and potions.
      (Patch courtesy of snarfblam.)
    group: "Quality of Life"
    display_order: 10
    default: "off"
    enabled: true
    phase: 1

  - id: flute_kills_pols
    type: tristate
    bits: 2
    bit_offset: 87
    label: "Recorder Kills Dungeon Pols Voice"
    description: >
      Play the recorder to kill all Pols Voice in dungeons.
      Does not work on the overworld.
      (Patch courtesy of Stratoform.)
    group: "Quality of Life"
    display_order: 200
    default: "off"
    enabled: true
    phase: 1

  - id: four_potion_inventory
    type: tristate
    bits: 2
    bit_offset: 91
    label: "Four Potion Inventory"
    description: >
      Increases the potion inventory from 2 to 4 blue potions.
    group: "Quality of Life"
    display_order: 110
    default: "off"
    enabled: true
    phase: 1

  - id: auto_show_letter
    type: tristate
    bits: 2
    bit_offset: 93
    label: "Auto Show Letter"
    description: >
      Automatically shows the letter to NPCs without equipping and using it.
    group: "Quality of Life"
    display_order: 100
    default: "off"
    enabled: true
    phase: 1

  - id: like_like_rupees
    type: tristate
    bits: 2
    bit_offset: 95
    label: "Like-Like Eats Rupees"
    description: >
      Makes Like-Likes eat rupees instead of a magical shield.
    group: "Quality of Life"
    display_order: 210
    default: "off"
    enabled: true
    phase: 1

  # ---------------------------------------------------------------------------
  # GROUP: Caves and Shops
  # Cave-specific randomization settings
  # ---------------------------------------------------------------------------

  - id: shuffle_shop_items
    type: tristate
    bits: 2
    bit_offset: 114
    label: "Shuffle Shop Items"
    description: >
      Shuffles the 12 items across shops A-D, guaranteeing at least one major
      item per shop. Also jitters shop prices by ±20, and randomizes prices
      for the potion shop, secret caves, and door repair cave.
    group: "Caves and Shops"
    display_order: 5
    default: "off"
    enabled: true
    phase: 1

  - id: randomize_white_sword_hearts
    type: bool
    bits: 1
    bit_offset: 97
    label: "Randomize White Sword Hearts"
    description: >
      Randomizes the white sword cave heart requirement to between 4 and 6.
    group: "Caves and Shops"
    display_order: 10
    default: false
    enabled: true
    phase: 1

  - id: randomize_magical_sword_hearts
    type: bool
    bits: 1
    bit_offset: 98
    label: "Randomize Magical Sword Hearts"
    description: >
      Randomizes the magical sword cave heart requirement to between 10 and 12.
    group: "Caves and Shops"
    display_order: 20
    default: false
    enabled: true
    phase: 1

  - id: permanent_sword_beam
    type: tristate
    bits: 2
    bit_offset: 99
    label: "Permanent Sword Beam"
    description: >
      Makes the sword beam fire at any health level, not just when hearts are full.
    group: "Misc"
    display_order: 80
    default: "off"
    enabled: true
    phase: 1

  - id: book_is_an_atlas
    type: tristate
    bits: 2
    bit_offset: 101
    label: "Book Is An Atlas"
    description: >
      Makes the Book of Magic function as an overworld atlas, displaying the map
      when used.
    group: "Misc"
    display_order: 100
    default: "off"
    enabled: true
    phase: 1

  - id: book_is_a_translator
    type: tristate
    bits: 2
    bit_offset: 105
    label: "Book Is A Translator"
    description: >
      Makes the Book of Magic function as a translator — old men's hint text
      is only shown when the player has the book.
    group: "Misc"
    display_order: 110
    default: "off"
    enabled: true
    phase: 1

  - id: visual_roar_sound
    type: enum
    bits: 3
    bit_offset: 107
    label: "Visual Roar Sound"
    description: >
      Patches dungeon entry to display a beast sound above the level number
      instead of the vanilla "LIFE" label. OFF disables the patch entirely.
      RANDOM picks one of the six sounds at random each seed.
    group: "Misc"
    display_order: 90
    default: "disabled"
    enabled: true
    phase: 1
    values:
      - id: disabled
        label: "Off"
      - id: roar
        label: "ROAR"
      - id: rawr
        label: "RAWR"
      - id: meow
        label: "MEOW"
      - id: woof
        label: "WOOF"
      - id: hiss
        label: "HISS"
      - id: honk
        label: "HONK"
      - id: random
        label: "Random"

  - id: replace_book_fire_with_explosion
    type: tristate
    bits: 2
    bit_offset: 110
    label: "Replace Book Fire with Explosion"
    description: >
      Replaces the Book of Magic's fire projectile with a bomb explosion
      effect.
    group: "Misc"
    display_order: 120
    default: "off"
    enabled: true
    phase: 1

  - id: fix_known_bugs
    type: tristate
    bits: 2
    bit_offset: 112
    label: "Fix Known Bugs"
    description: >
      Applies a collection of vanilla ROM bug fixes: scrolling glitch,
      continue screen, enemy kill counter, enemy sprite rendering, quest
      mode check, enemy flash/pause routine, and sound engine fixes.
    group: "Quality of Life"
    display_order: 80
    default: "off"
    enabled: true
    phase: 1

  # ---------------------------------------------------------------------------
  # GROUP: Overworld
  # Overworld layout, entrance shuffle, and start location settings
  # ---------------------------------------------------------------------------

  - id: cave_shuffle_mode
    type: enum
    bits: 3
    bit_offset: 62
    label: "Cave Shuffle"
    description: >
      Controls which cave entrances are shuffled on the overworld.
      Vanilla: no shuffling.
      Dungeons Only: only dungeon (Level 1-9) entrances are shuffled.
      Non-Dungeons Only: only non-dungeon caves are shuffled.
      All Caves: both dungeon and non-dungeon entrances are shuffled.
    group: "Overworld"
    display_order: 10
    default: "vanilla"
    enabled: true
    phase: 2
    values:
      - id: vanilla
        label: "Vanilla"
      - id: dungeons_only
        label: "Dungeons Only"
      - id: non_dungeons_only
        label: "Non-Dungeons Only"
      - id: all_caves
        label: "All Caves"

  - id: include_wood_sword_cave
    type: tristate
    bits: 2
    bit_offset: 67
    label: "Include Wood Sword Cave"
    description: >
      When enabled, the wood sword cave entrance is included in the non-dungeon
      cave shuffle pool. Requires Cave Shuffle to include non-dungeon caves.
    group: "Overworld"
    display_order: 20
    default: "off"
    enabled: true
    phase: 2

  - id: include_any_road_caves
    type: tristate
    bits: 2
    bit_offset: 69
    label: "Include Any Road Caves"
    description: >
      When enabled, the Take Any Road cave entrances (normally power-bracelet
      gated) are included in the non-dungeon cave shuffle pool. Requires Cave
      Shuffle to include non-dungeon caves.
    group: "Overworld"
    display_order: 30
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_armos_location
    type: tristate
    bits: 2
    bit_offset: 65
    label: "Shuffle Armos Screen"
    description: >
      When enabled, randomizes which overworld screen the armos item appears on.
    group: "Overworld"
    display_order: 130
    default: "off"
    enabled: true
    phase: 2

  - id: randomize_mmg
    type: tristate
    bits: 2
    bit_offset: 57
    label: "Randomize MMG"
    description: >
      Randomizes the prizes for the money making game. The two losing amounts
      are drawn from 1-20 rupees, the big-number trap from 30-50, and the two
      winning amounts from 10-30 and 25-75 respectively.
    group: "Caves and Shops"
    display_order: 100
    default: "off"
    enabled: true
    phase: 1

  - id: start_screen
    type: enum
    bits: 2
    bit_offset: 60
    label: "Start Screen"
    description: >
      Controls which overworld screen Link starts on.
      Vanilla leaves the start screen unmodified.
      Easy Shuffle picks a random open screen, excluding all 44 special screens.
      Full Shuffle picks a random open screen, excluding only the base set.
      Wood Sword Screen places Link one row below the wood sword cave entrance.
    group: "Overworld"
    display_order: 100
    default: "vanilla"
    enabled: true
    phase: 2
    values:
      - id: vanilla
        label: "Vanilla"
      - id: easy_shuffle
        label: "Easy Shuffle"
      - id: full_shuffle
        label: "Full Shuffle"
      - id: wood_sword_screen
        label: "Wood Sword Screen"

  - id: add_l4_sword
    type: bool
    bits: 1
    bit_offset: 123
    label: "Add L4 Sword"
    description: >
      Adds an additional sword upgrade guarded by the level 9 triforce checker.
      Note that with a L4 sword, melee attacks will do L4 damage but beams do
      L3 damage. Only meaningful when Progressive Items is enabled.
    group: "Item Shuffle"
    display_order: 80
    default: false
    enabled: true
    phase: 1

  - id: magical_boomerang_does_one_hp_damage
    type: bool
    bits: 1
    bit_offset: 122
    label: "Magical Boomerang Does 1 HP Damage"
    description: >
      Changes the magical boomerang to deal 1 HP of damage (equivalent to the
      wood sword) to enemies. Note that a boomerang may damage an enemy multiple
      times in one shot.
    group: "Misc"
    display_order: 500
    default: false
    enabled: true
    phase: 1

  # ---------------------------------------------------------------------------
  # GROUP: Enemies
  # Controls enemy shuffling, HP changes, and related settings
  # ---------------------------------------------------------------------------

  - id: shuffle_overworld_monsters
    type: tristate
    bits: 2
    bit_offset: 124
    label: "Shuffle Overworld Monsters"
    description: >
      Shuffles which enemies appear on the overworld, redistributing enemy
      types across overworld screens.
    group: "Enemies"
    display_order: 10
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_dungeon_monsters
    type: tristate
    bits: 2
    bit_offset: 126
    label: "Shuffle Dungeon Monsters"
    description: >
      Shuffles dungeon monster assignments within each level using a
      constrained Fisher-Yates shuffle. Safety constraints prevent enemies
      from being placed in incompatible room types.
    group: "Enemies"
    display_order: 20
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_ganon_zelda
    type: tristate
    bits: 2
    bit_offset: 128
    label: "Shuffle Gannon and Zelda"
    description: >
      Includes the Gannon and Zelda rooms in the dungeon monster shuffle pool.
      Requires Shuffle Dungeon Monsters to be enabled.
    group: "Enemies"
    display_order: 30
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_level_9_monsters
    type: tristate
    bits: 2
    bit_offset: 130
    label: "Shuffle Level 9 Monsters"
    description: >
      Includes level 9 in the monster shuffle pools. Affects both within-level
      shuffling and between-levels shuffling.
    group: "Enemies"
    display_order: 40
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_monsters_between_levels
    type: tristate
    bits: 2
    bit_offset: 132
    label: "Shuffle Monsters Between Levels"
    description: >
      Moves monster groups between dungeon levels. Enemies are categorized
      into tier-based pools and redistributed across levels.
    group: "Enemies"
    display_order: 50
    default: "off"
    enabled: true
    phase: 2

  - id: add_2nd_quest_monsters
    type: tristate
    bits: 2
    bit_offset: 134
    label: "Add 2nd Quest Monsters"
    description: >
      Merges 2nd quest enemy variants into the 1st quest enemy pools,
      adding more variety to the enemies encountered.
    group: "Enemies"
    display_order: 60
    default: "off"
    enabled: true
    phase: 2

  - id: enemy_hp
    type: enum
    bits: 3
    bit_offset: 136
    label: "Enemy HP"
    description: >
      Controls enemy hit points. Normal leaves HP unchanged. +/-2 and +/-4
      randomize each enemy's HP within that range. 0 HP sets all enemies to
      die in one hit. Random picks one of the other options at generation time.
    group: "Enemies"
    display_order: 100
    default: "normal"
    enabled: true
    phase: 2
    values:
      - id: normal
        label: "Normal"
      - id: plus_minus_2
        label: "+/-2 HP"
      - id: plus_minus_4
        label: "+/-4 HP"
      - id: zero
        label: "0 HP"
      - id: random
        label: "Random"

  - id: boss_hp
    type: enum
    bits: 3
    bit_offset: 139
    label: "Boss HP"
    description: >
      Controls boss hit points. Normal leaves HP unchanged. +/-2 and +/-4
      randomize each boss's HP within that range. 0 HP sets all bosses to
      die in one hit. Random picks one of the other options at generation time.
    group: "Enemies"
    display_order: 110
    default: "normal"
    enabled: true
    phase: 2
    values:
      - id: normal
        label: "Normal"
      - id: plus_minus_2
        label: "+/-2 HP"
      - id: plus_minus_4
        label: "+/-4 HP"
      - id: zero
        label: "0 HP"
      - id: random
        label: "Random"

  - id: ganon_hp_to_zero
    type: tristate
    bits: 2
    bit_offset: 142
    label: "Set Gannon HP to 0"
    description: >
      Sets Gannon's HP to 0, making the final boss die in one hit
      regardless of the Boss HP setting.
    group: "Enemies"
    display_order: 120
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_enemy_groups
    type: tristate
    bits: 2
    bit_offset: 144
    label: "Shuffle Enemy Groups"
    description: >
      Shuffles which enemies appear in each dungeon's sprite group,
      changing the enemy roster for each dungeon level.
    group: "Still in Testing"
    display_order: 70
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_bosses
    type: tristate
    bits: 2
    bit_offset: 146
    label: "Shuffle Bosses"
    description: >
      Assigns a random boss difficulty tier to each dungeon level,
      then replaces boss enemies with random picks from the assigned
      tier's pool. Earlier dungeons are biased toward easier bosses.
    group: "Enemies"
    display_order: 80
    default: "off"
    enabled: true
    phase: 2

  - id: change_dungeon_boss_groups
    type: tristate
    bits: 2
    bit_offset: 148
    label: "Change Dungeon Boss Groups"
    description: >
      Redistributes which bosses belong to which sprite-set group
      (A/B/C), then replaces every existing boss room with a random
      pick from its group's new pool.
    group: "Still in Testing"
    display_order: 90
    default: "off"
    enabled: true
    phase: 2

  - id: shuffle_dungeon_rooms
    type: tristate
    bits: 2
    bit_offset: 150
    label: "Shuffle Dungeon Rooms"
    description: >
      Shuffles room contents within each dungeon level. The physical
      wall layout is preserved — only the room contents (enemies, items,
      room types, darkness, palettes) move between grid positions.
      Door pairs between adjacent rooms are also shuffled.
    group: "Still in Testing"
    display_order: 10
    default: "off"
    enabled: true
    phase: 2

  # ---------------------------------------------------------------------------
  # GROUP: Cosmetic
  # Visual and control feel settings that do not affect logic or item placement
