    bits: 2
    cosmetic_bit_offset: 0
    cosmetic: true
    label: "SELECT Button Item Swap"
    description: >
      Controls whether the SELECT button can switch the equipped B-button item
      while paused.
      Pause: vanilla behavior, SELECT opens the pause menu as normal.
      Swap: pressing SELECT while paused jumps directly to item slot 7.
      Toggle: pressing SELECT while paused cycles between two item pages, with
      SWAP/PAUSE labels rendered on the pause menu.
