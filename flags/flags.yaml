# =============================================================================
# ZORA — Zelda 1 Randomizer
# flags/flags.yaml — Canonical flag definitions
# =============================================================================
#
# This file is the single source of truth for all randomizer flags.
# It drives both the Python backend (flags_generated.py) and the React UI.
#
# ENCODING RULES:
#   - Flag strings are base64url-style encoded (chars: 0-9, A-Z, a-z, -, _)
#   - Bits are packed LSB-first (bit 0 = LSB of first character)
#   - Each flag declares its own permanent bit_offset and bits width
#   - New flags always append at the next unused offset — never reorder
#   - Old flag strings are valid prefixes; unset bits default to 0
#   - 0 must always be the safe default for every flag type:
#       tristate: 0 = off
#       item:     0 = random
#       bool:     0 = false
#
# BREAKING CHANGES:
#   Any change to bit_offset or bits of an existing flag, or reordering of
#   item_enum indices, requires incrementing format_version and is a major release.
#
# =============================================================================

version: 1

meta:
  format_version: 3
  encoding: base64url      # chars: A-Z0-9!@a-z, value 0='A' through 63='z'
  bit_order: lsb_first     # bit 0 = LSB of first base64 character
  total_bits: 156          # 26 base64 characters
  string_length: 26

# Cosmetic flags are encoded separately and do not affect the seed hash.
# Players can change cosmetics without changing the logical game.
cosmetic_meta:
  encoding: base64url
  bit_order: lsb_first
  total_bits: 42           # 7 base64 characters (39 bits used, padded to 42)
  string_length: 7

# =============================================================================
# ITEM ENUM
# Canonical ordered list for item-type flag fields.
# Indices are PERMANENT. Never reorder. New items append only.
# 5 bits per field → values 0-31. 24 defined, 8 reserved slots.
# =============================================================================

